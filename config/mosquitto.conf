# HERMES — Mosquitto broker config for local development.
# Production uses a hardened config under /etc/hermes/mosquitto/ with
# authentication, ACLs, and TLS.

listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

# Dev-only: allow anonymous connections. Never enable in production.
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
