version: 2

updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    reviewers:
      - "Rushikesh-Palande"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    reviewers:
      - "Rushikesh-Palande"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    reviewers:
      - "Rushikesh-Palande"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"

  # Docker
  - package-ecosystem: "docker"
    directory: "/packaging"
    schedule:
      interval: "monthly"
    reviewers:
      - "Rushikesh-Palande"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
