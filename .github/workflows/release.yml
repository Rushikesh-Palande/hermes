# .github/workflows/release.yml
#
# Fires on every annotated tag push of the form `v*` (e.g. `v0.1.0-alpha.26`)
# and produces a polished GitHub Release with three buildable artefact
# families attached:
#
#   1. Debian packages: hermes_<version>_<arch>.deb  (amd64 + arm64)
#   2. Offline bundles: hermes-<version>-<arch>-offline.tar.gz
#   3. Container image: ghcr.io/<owner>/hermes:<version>  (multi-arch)
#
# Plus SHA256SUMS for the .deb and tarball downloads.
#
# Body of the Release page is generated by packaging/release-notes.sh,
# which extracts the matching CHANGELOG.md section, surfaces install
# commands per path, and links to every doc.
#
# Pipeline:
#
#   ┌───────────┐
#   │ build-deb │  matrix: amd64, arm64    (Debian package)
#   └─────┬─────┘
#         │ uploads .deb to artifact store
#         │
#   ┌─────┼──────────┐
#   │ build-offline  │  matrix: amd64, arm64    (offline tarball)
#   └─────┬──────────┘
#         │ uploads .tar.gz to artifact store
#         │
#   ┌─────┴──────────┐
#   │ build-docker   │  multi-arch buildx → ghcr.io
#   └─────┬──────────┘
#         │ pushes :<version> + (sometimes) :latest
#         │
#   ┌─────┴──────────┐
#   │ release        │  downloads all artifacts, computes SHA256SUMS,
#   │                │  generates body via release-notes.sh, calls
#   │                │  `gh release create` with everything attached
#   └────────────────┘
#
# Permissions:
#   - contents: write     → create the Release object
#   - packages: write     → push the Docker image to ghcr.io
#
# Secrets used:
#   - GITHUB_TOKEN        → auto-injected. Used for both the Release API
#                           and ghcr.io auth (GITHUB_TOKEN works there
#                           for org/user-owned packages).
#
# Failure semantics: every job is independent except `release` which
# depends on the three build jobs. If the Docker push fails (e.g.
# GHCR outage), the .deb + tarball still publish; `latest` just
# doesn't update. If a build job fails, the Release does not happen.

name: Release

on:
  push:
    tags:
      - 'v*'

# Don't run more than one release at a time per tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write     # gh release create
  packages: write     # docker push to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hermes

jobs:
  # ─── 1. Debian packages ─────────────────────────────────────────

  build-deb:
    # Single job, no matrix: the package is Architecture: all (pure
    # Python source + a JS bundle), so one .deb works on amd64 and
    # arm64 hosts. The platform-specific Python venv is built at
    # install time from the host's libc / glibc by install.sh.
    name: Build .deb
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # we need git tags + previous-tag lookup

      - name: Compute version from tag
        id: version
        run: |
          # Tag is v0.1.0-alpha.26; Debian wants the leading 'v' stripped
          # and prerelease '-' replaced with '~' for proper sort order:
          #   0.1.0~alpha.26-1 < 0.1.0~beta.1-1 < 0.1.0~rc.1-1 < 0.1.0-1
          # We rewrite all three prerelease markers, not just alpha — beta
          # and rc need the same treatment to sort before the GA version.
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          DEB_VERSION="$(echo "$VERSION" \
              | sed -e 's/-alpha\./~alpha./' \
                    -e 's/-beta\./~beta./' \
                    -e 's/-rc\./~rc./')-1"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "deb_version=$DEB_VERSION" >> "$GITHUB_OUTPUT"

      # pnpm + node are needed by debian/rules override_dh_auto_build
      # (cd ui && pnpm install --frozen-lockfile && pnpm build). Setting
      # them up via actions guarantees pnpm is on PATH when
      # dpkg-buildpackage invokes make, which the manual npm-global
      # approach did not reliably achieve.
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Sync debian/changelog with the tag
        run: |
          # printf avoids any YAML-indentation contamination that a
          # heredoc inside `run: |` could introduce. Debian changelog
          # requires column-0 for the header and footer lines.
          printf 'hermes (%s) unstable; urgency=medium\n\n  * Release %s. See CHANGELOG.md.\n\n -- HERMES Release Bot <ops@embedsquare.com>  %s\n' \
            '${{ steps.version.outputs.deb_version }}' \
            '${{ steps.version.outputs.tag }}' \
            "$(date -R)" > debian-changelog-tmp
          cat debian-changelog-tmp packaging/debian/changelog > /tmp/cl
          mv /tmp/cl packaging/debian/changelog
          # debhelper expects debian/ at the repo root. cp -r avoids any
          # symlink-resolution edge cases in debhelper tools.
          cp -r packaging/debian debian

      - name: Install build deps
        run: |
          # build-essential is listed in debian/control Build-Depends and
          # is checked by dpkg-checkbuilddeps; install it explicitly so
          # the check passes (ubuntu-24.04 runners may not pre-install it).
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper devscripts

      - name: Build the .deb
        run: |
          # -us -uc skips signing (we don't have a GPG key in CI). The
          # resulting .deb is unsigned but valid; signing is a separate
          # concern handled by repository signing in GHCR or APT.
          # -b  → binary-only (skip the source tarball).
          # --build=binary skips arch-independent dh_auto_test.
          dpkg-buildpackage -us -uc -b
          # Output lands one dir up from the source root.
          ls -la ../*.deb
          mkdir -p dist
          cp ../*.deb dist/

      - name: Inspect the .deb
        run: |
          for deb in dist/*.deb; do
            echo "─── $deb ───"
            dpkg-deb -I "$deb" | head -30
            echo "Files (first 20):"
            dpkg-deb -c "$deb" | head -20
          done

      - name: Upload .deb artefact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 7

  # ─── 2. Offline bundles ─────────────────────────────────────────

  build-offline:
    name: Build offline bundle (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]   # arm64 needs a self-hosted runner or buildx; punt
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.11

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Build offline bundle
        run: |
          OUT="hermes-${{ steps.version.outputs.version }}-${{ matrix.arch }}-offline.tar.gz"
          ./packaging/build-offline-bundle.sh \
            --arch ${{ matrix.arch }} \
            --out "$OUT"
          ls -lh "$OUT"

      - name: Upload offline bundle
        uses: actions/upload-artifact@v4
        with:
          name: offline-${{ matrix.arch }}
          path: hermes-*-offline.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ─── 3. Multi-arch container image ──────────────────────────────

  build-docker:
    name: Build + push container image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            # Strip the leading v from the version tag for cleaner output:
            type=match,pattern=v(.*),group=1
            # Only set :latest on stable releases (not alpha/beta/rc).
            type=raw,value=latest,enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (linux/amd64,linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 4. Create the GitHub Release ───────────────────────────────

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-deb, build-offline, build-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # release-notes.sh needs git tag history

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact dirs + compute SHA256SUMS
        run: |
          mkdir -p release-assets
          # Move everything out of per-job subdirs into release-assets/
          find dist -mindepth 2 -type f -exec mv {} release-assets/ \;
          (cd release-assets && sha256sum *.deb *.tar.gz > SHA256SUMS)
          ls -la release-assets/

      - name: Generate professional release body
        env:
          TAG: ${{ github.ref_name }}
        run: |
          packaging/release-notes.sh "$TAG" > /tmp/release-body.md
          echo "─── First 60 lines of generated body ───"
          head -60 /tmp/release-body.md

      - name: Determine release title
        id: title
        run: |
          # The annotated tag's subject line is the release title (the
          # message passed via `git tag -a -m '...'`). Fall back to the
          # bare tag name if the tag is lightweight.
          TITLE=$(git tag -l --format='%(contents:subject)' "${{ github.ref_name }}")
          if [ -z "$TITLE" ]; then
            TITLE="HERMES ${{ github.ref_name }}"
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "Release title: $TITLE"

      - name: Detect prerelease
        id: prerelease
        run: |
          # Mark alpha / beta / rc tags as prereleases so they don't
          # show up as "Latest release" on the repo page.
          if echo "${{ github.ref_name }}" | grep -qE '(alpha|beta|rc)'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.prerelease.outputs.value }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ steps.title.outputs.title }}" \
            --notes-file /tmp/release-body.md \
            --verify-tag \
            $PRERELEASE_FLAG \
            release-assets/*
