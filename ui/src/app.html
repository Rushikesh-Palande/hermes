<!doctype html>
<!--
  Root HTML shell. SvelteKit injects head and body contents at build time.
  Keep this file as minimal as possible — meta tags per-route belong in
  +layout.svelte or +page.svelte.
-->
<html lang="en" class="h-full">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <title>HERMES</title>
        %sveltekit.head%
    </head>
    <body class="h-full bg-neutral-50 text-neutral-900 antialiased dark:bg-neutral-950 dark:text-neutral-100">
        <div id="app" class="h-full">%sveltekit.body%</div>
    </body>
</html>
