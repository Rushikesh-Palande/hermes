# /etc/nginx/sites-available/hermes (or /etc/nginx/conf.d/hermes.conf)
#
# HERMES reverse-proxy site. Default-installed by packaging/install.sh
# as HTTP-only on port 80. Run `certbot --nginx` after pointing a DNS
# record at this host to upgrade to HTTPS — certbot rewrites this file
# in place to add TLS + redirect.
#
# Architecture:
#
#     Browser ──HTTPS──► nginx ──┬── /api/* ───► FastAPI (127.0.0.1:8080)
#                                │
#                                ├── /api/live_stream/*  same, but with
#                                │                      buffering off so
#                                │                      SSE frames flush
#                                │                      to the client
#                                │                      immediately
#                                │
#                                └── /  ────────► SvelteKit static bundle
#                                                 (served from disk by nginx)
#
# Why split the SSE location: the default proxy_buffering=on coalesces
# small responses, which collapses the SSE event stream into a single
# big buffer and makes the live chart appear frozen for seconds. Off
# for /live_stream, on for everything else.

# Serve the SvelteKit production build directly. The path matches what
# packaging/install.sh produces from `pnpm build`.
upstream hermes_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # accept any hostname; tighten in your deployment

    # Hard-cap upload size to defend against accidental huge bodies.
    # Detection config payloads are ~1 KB; events export is streaming,
    # not buffered.
    client_max_body_size 1m;

    # Common security headers — adjust to taste.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP is best set per-deployment after the UI's third-party deps
    # (uPlot, fonts) settle. The starter below is conservative.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'" always;

    # ── SvelteKit static bundle ──────────────────────────────────
    # adapter-node produces a Node server in /opt/hermes/ui/build,
    # but for the static-only flavour (or once we add adapter-static)
    # the assets live under /opt/hermes/ui/build/client.
    #
    # If the deployment uses adapter-node (today's default), proxy
    # everything not matching /api to it instead. Comment-toggle below.

    root /opt/hermes/ui/build/client;
    try_files $uri $uri/ /index.html;

    # If you switch to adapter-node, replace the two lines above with:
    #     location / {
    #         proxy_pass http://127.0.0.1:3000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }

    # ── /api/live_stream — SSE, no buffering ─────────────────────
    location /api/live_stream/ {
        proxy_pass http://hermes_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;     # SSE connections can stay open long
        chunked_transfer_encoding on;
    }

    # ── Everything else under /api ───────────────────────────────
    location /api/ {
        proxy_pass http://hermes_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Default buffering on — fine for REST.
    }

    # ── /api/metrics — optional internal-only ACL ────────────────
    # Uncomment + adjust to allow Prometheus scraping only from a
    # specific subnet.
    # location = /api/metrics {
    #     allow 10.0.0.0/8;
    #     deny all;
    #     proxy_pass http://hermes_api;
    # }

    # ── nginx itself ─────────────────────────────────────────────
    # access + error logs to /var/log/nginx by default
    # gzip on by default (system-wide nginx.conf)
}
